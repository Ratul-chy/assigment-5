<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav>
        <div class=" bg-base-100 shadow-sm flex justify-between items-center px-4 py-2">
            <div class="flex-1">
                <div class=" flex items-center gap-2">
                    
                    <img class=" w-10 h-10" src="assets/github-logo.png" alt="GitHub Logo">
                    <a class=" font-bold text-xl">GitHub Issues Tracker</a>
                </div>
            </div>

            <div class="flex gap-2">
                    <input id="searchInput" placeholder=" Search issue" class="input input-bordered w-full max-w-xs" />
                    <button class="btn btn-soft btn-primary" onclick="searchIssue()">New Issue </button>
            </div>
            
        </div>
    </nav>

    <section class=" p-4 bg-gray-100  mx-auto">

        <div class="tabs flex gap-2  bg-base-100 shadow-sm p-2 rounded-box">

            <button class="btn btn-soft btn-primary" id="allTab" onclick="changeTab('all')">All</button>
            <button class="btn btn-soft btn-primary" id="openTab" onclick="changeTab('open')">Open</button>
            <button class="btn btn-soft btn-primary" id="closedTab" onclick="changeTab('closed')">Closed</button>

        </div>

    </section>

    <section class=" p-4 bg-gray-100  mx-auto">
        <div class=" flex justify-between gap-2  bg-base-100 shadow-sm p-2 rounded-box">

            <div class=" flex items-center gap-4">
                <img src="assets/Aperture.png" alt="Aperture Logo" class=" ">
                <div class="">
                    <p class="font-bold"> <span id="issues number ">50</span>  Issues</p>
                    <p>Track and manage your project issues</p>

                </div>
            </div>
            <div class="flex gap-2">
                <div class=" flex items-center gap-2">
                    <img src="assets/Open-Status.png" alt="">
                    <p>Open</p>

                </div>
                <div class=" flex items-center gap-2">
                    <img src="assets/Closed- Status .png" alt="">
                    <p>Closed</p>

                </div>
            </div>


        </div>
    </section>

    <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4"></div>

    



    <script src="main.js"></script>
</body>
</html>
