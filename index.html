<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assigment 5</title>

    <!-- daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
<section class="flex items-center justify-center h-screen bg-gray-100">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <div class="mx-auto text-center mb-4">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="mx-auto mb-4 w-16">
                <h2 class="text-2xl font-bold mb-4">GitHub Issues Tracker</h2>
                <p class="text-gray-600">Sign in to manage your issues</p>
            </div>

            <label class="label">Username</label>
            <input type="text" class="input w-full" placeholder="Username" id="username"/>
            <p class="text-blue-500 mb-2">Default: admin</p>

            <label class="label">Password</label>
            <input type="password" class="input w-full" placeholder="Password" id="password"/>
            <p class="text-blue-500">Default: admin123</p>

            <button onclick="login()" class="btn btn-active btn-primary mt-4 mb-4">Sign In</button>

            <h1 class=" items-center text-center text-lg font-semibold mb-1"> Demo Credentials</h1>

            <div class="card bg-base-100 w-96 shadow-sm">
                
                <div class="card-body items-center text-center">
                <p> <span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
            </div>
        </fieldset>
</section>
    

<script src="main.js"></script>
</body>
</html>
